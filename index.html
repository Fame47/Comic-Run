<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comic Run</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#080811;color:white;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body{display:flex;justify-content:center;padding:8px}
.wrap{width:100%;max-width:1100px}
.game{
  position:relative;width:100%;height:620px;overflow:hidden;border:4px solid #111;border-radius:18px;
  background:#5ed1ff;box-shadow:0 14px 40px rgba(0,0,0,.45);
}
.sky,.clouds,.front,.road{position:absolute;left:0;pointer-events:none}
.sky{inset:0;background:url("./bg-sky.png") repeat-x top left;background-size:auto 100%;z-index:1}
.clouds{
  inset:0;width:200%;background:url("./clouds.png") repeat-x 30% 12%;
  background-size:auto 40%;z-index:2;opacity:.95;animation:cloudMove 42s linear infinite;
}
.front{
  inset:0;width:200%;background:url("./bg-front.png") repeat-x bottom left;
  background-size:auto 100%;z-index:3;animation:bgFront 18s linear infinite;
}
.road{left:0;right:0;bottom:0;height:118px;background:#13131b;border-top:5px solid #20202a;z-index:4}
.road:before{
  content:"";position:absolute;top:54px;left:0;width:200%;height:7px;
  background:repeating-linear-gradient(90deg,#ffe052 0 55px,transparent 55px 115px);
  animation:bgRoad 1.8s linear infinite;
}
@keyframes cloudMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes bgFront{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes bgRoad{from{transform:translateX(0)}to{transform:translateX(-115px)}}

#player{
  position:absolute;left:92px;bottom:104px;width:132px;height:132px;
  background:url("./sloan-run-1.png") no-repeat center bottom/contain;z-index:30;transform-origin:bottom center;
}
#player.running{animation:bodyBob .23s infinite alternate}
#player.jump{animation:none;transform:rotate(-3deg) scale(1.03)}
#player.invincible{animation:blink .16s infinite alternate}
@keyframes bodyBob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
@keyframes blink{from{opacity:.22}to{opacity:1}}

.obstacle,.pickup{position:absolute;z-index:25;background-repeat:no-repeat;background-position:center bottom;background-size:contain}
.cat{width:62px;height:48px;bottom:104px;background-image:url("./cat.png")}
.cone{width:48px;height:76px;bottom:104px;background-image:url("./cone.png")}
.bird{width:72px;height:48px;bottom:245px;background-image:url("./bird.png")}
.hydrant{width:58px;height:82px;bottom:104px;background-image:url("./fire-hydrant.png")}
.dog{width:94px;height:72px;bottom:104px;background-image:url("./dog.png")}
.trashcan{width:72px;height:86px;bottom:104px;background-image:url("./trashcan.png")}
.pickup{
  width:54px;height:70px;bottom:255px;background-image:url("./comic.png");
  filter:drop-shadow(0 0 10px #00ffb3) drop-shadow(0 0 16px #fff);
  animation:comicFloat .7s infinite alternate;
}
@keyframes comicFloat{from{transform:translateY(0) rotate(-6deg)}to{transform:translateY(-9px) rotate(6deg)}}

.hud{
  position:absolute;top:10px;left:10px;right:10px;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:8px;
  background:rgba(0,0,0,.42);border:2px solid rgba(255,255,255,.22);padding:8px 10px;border-radius:14px;
  font-weight:900;text-shadow:2px 2px #000;
}
.hud button{font-size:12px;padding:7px 9px;box-shadow:0 3px 0 #9b7510}
.lives span{color:#ff3333;font-size:20px}
.soundBtns{display:flex;gap:4px}

.screen{
  position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
  padding:18px;background:rgba(0,0,0,.72);
}
.hidden{display:none}
.menuArt{position:absolute;inset:0;background:url("./cr-menu.png") center/cover no-repeat;opacity:.82;z-index:-1}
.powWrap{position:relative;display:inline-block;margin-bottom:10px}
.smoke{
  position:absolute;left:50%;top:52%;width:360px;height:155px;transform:translate(-50%,-50%) rotate(-5deg);z-index:-1;
  background:
    radial-gradient(circle at 12% 50%, #fff 0 26px, transparent 27px),
    radial-gradient(circle at 25% 35%, #f2f2f2 0 34px, transparent 35px),
    radial-gradient(circle at 43% 52%, #fff 0 44px, transparent 45px),
    radial-gradient(circle at 63% 40%, #f4f4f4 0 37px, transparent 38px),
    radial-gradient(circle at 80% 55%, #fff 0 31px, transparent 32px);
  filter:drop-shadow(5px 7px 0 #111);
}
.title{
  font-size:74px;line-height:.9;margin:0;color:#ffe54a;-webkit-text-stroke:4px #111;
  text-shadow:5px 5px 0 #ff3333, 9px 9px 0 #1d7cff, 0 0 18px #fff;
  transform:rotate(-5deg);font-weight:1000;letter-spacing:2px;
}
button{
  border:0;border-radius:12px;background:#ffe54a;color:#111;font-weight:1000;padding:12px 18px;margin:5px;cursor:pointer;box-shadow:0 4px 0 #9b7510;
}
button:hover{filter:brightness(1.08);transform:translateY(-1px)}
button.locked{opacity:.5}
input{padding:12px;border:0;border-radius:10px;text-align:center;margin:8px;font-weight:bold}
.small{max-width:720px;color:#f5f5ff;text-shadow:2px 2px #000;font-weight:bold}
.skinBox{background:rgba(0,0,0,.55);padding:10px;border-radius:14px;border:2px solid rgba(255,255,255,.18)}
.leaderTicker{
  position:absolute;left:0;right:0;bottom:0;height:34px;z-index:80;background:rgba(0,0,0,.72);
  border-top:2px solid #ffe54a;overflow:hidden;white-space:nowrap;
}
.tickerText{
  display:inline-block;padding-left:100%;line-height:32px;font-weight:900;color:#ffe54a;text-shadow:2px 2px #000;
  animation:ticker 16s linear infinite;
}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.flash{position:absolute;inset:0;z-index:90;pointer-events:none;background:white;opacity:0}
.flash.hit{animation:hitFlash .22s linear}
@keyframes hitFlash{0%{opacity:.6}100%{opacity:0}}
.shake{animation:shake .25s linear}
@keyframes shake{
  0%{transform:translate(0,0)}25%{transform:translate(-6px,2px)}
  50%{transform:translate(6px,-2px)}75%{transform:translate(-3px,1px)}100%{transform:translate(0,0)}
}
.pointsPop{
  position:absolute;z-index:60;color:#ffe54a;font-size:24px;font-weight:1000;-webkit-text-stroke:1px #111;
  text-shadow:2px 2px #000;animation:popUp .8s forwards;
}
@keyframes popUp{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-55px) scale(1.3)}}

@media(max-width:700px){
  .game{height:470px}
  #player{left:54px;width:104px;height:104px;bottom:86px}
  .road{height:98px}
  .cat{width:50px;height:39px;bottom:86px}.cone{width:40px;height:62px;bottom:86px}
  .bird{width:60px;height:40px;bottom:200px}.hydrant{width:46px;height:68px;bottom:86px}
  .dog{width:78px;height:60px;bottom:86px}.trashcan{width:58px;height:72px;bottom:86px}
  .pickup{width:44px;height:58px;bottom:210px}
  .title{font-size:48px}.smoke{width:260px;height:120px}
  .hud{font-size:12px;gap:4px}.hud button{font-size:10px;padding:6px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="game" id="game">
    <div class="sky"></div><div class="clouds"></div><div class="front"></div><div class="road"></div>
    <div id="player" class="running"></div>
    <div id="flash" class="flash"></div>

    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Coins: <span id="coins">0</span></div>
      <div class="lives">Lives: <span id="lifeIcons">♥♥</span></div>
      <div><span id="charName">Sloan</span></div>
      <div class="soundBtns">
        <button onclick="toggleSfx()" id="sfxBtn">SFX ON</button>
        <button onclick="toggleMusic()" id="musicBtn">MUSIC OFF</button>
      </div>
    </div>

    <div class="screen" id="menu">
      <div class="menuArt"></div>
      <div class="powWrap"><div class="smoke"></div><h1 class="title">Comic Run</h1></div>
      <div class="skinBox">
        <h3>Choose Runner</h3>
        <button onclick="setCharacter('sloan')">Sloan</button>
        <button id="jaelynBtn" onclick="selectJaelyn()">🔒 Jaelyn - 500 Coins</button>
      </div>
      <button onclick="startGame()">START GAME</button>
      <p class="small">Collect comics for +25 coins. Jaelyn unlocks at 500 coins. You get 2 lives. Every 1000 points restores 1 life.</p>
    </div>

    <div class="screen hidden" id="gameOver">
      <div class="powWrap"><div class="smoke"></div><h1 class="title">Run Over!</h1></div>
      <p>Your Score: <span id="finalScore">0</span></p>
      <p>Coins: <span id="finalCoins">0</span></p>
      <input id="nameInput" maxlength="10" placeholder="Runner name">
      <div>
        <button onclick="saveScore()">SAVE SCORE</button>
        <button onclick="runAgain()">RUN AGAIN</button>
        <button onclick="returnMenu()">RETURN TO MAIN MENU</button>
      </div>
    </div>

    <div class="leaderTicker"><div class="tickerText" id="tickerText">TOP RUNNERS loading...</div></div>
  </div>
</div>

<audio id="bgMusic" src="./music.mp3" loop></audio>

<script>
const game=document.getElementById("game"), player=document.getElementById("player");
const scoreEl=document.getElementById("score"), coinsEl=document.getElementById("coins"), lifeIcons=document.getElementById("lifeIcons");
const charName=document.getElementById("charName"), menu=document.getElementById("menu"), gameOver=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore"), finalCoins=document.getElementById("finalCoins");
const jaelynBtn=document.getElementById("jaelynBtn"), tickerText=document.getElementById("tickerText"), flash=document.getElementById("flash");
const music=document.getElementById("bgMusic"), sfxBtn=document.getElementById("sfxBtn"), musicBtn=document.getElementById("musicBtn");

let running=false, score=0, coins=0, lives=2, speed=6, baseSpeed=6;
let gravity=.92, jumpPower=17.6, velocity=0, ground=104, playerBottom=ground;
let obstacles=[], pickups=[], spawnTimer=70, animation, runFrame=1, runTicker=0;
let invincible=false, lastLifeBonus=0, nextComicScore=100, lastSpeedTime=0;
let sfxOn=localStorage.getItem("comicRunSfx")!=="off";
let musicOn=localStorage.getItem("comicRunMusic")==="on";
let currentCharacter=localStorage.getItem("comicRunCharacter")||"sloan";
let unlocked=JSON.parse(localStorage.getItem("comicRunUnlocked")||'["sloan"]');

function updateButtons(){sfxBtn.textContent=sfxOn?"SFX ON":"SFX OFF";musicBtn.textContent=musicOn?"MUSIC ON":"MUSIC OFF"}
function toggleSfx(){sfxOn=!sfxOn;localStorage.setItem("comicRunSfx",sfxOn?"on":"off");updateButtons()}
function toggleMusic(){musicOn=!musicOn;localStorage.setItem("comicRunMusic",musicOn?"on":"off");updateButtons();if(musicOn)music.play().catch(()=>{});else music.pause()}

let audioCtx=null;
function tone(freq,dur,type="sine",gain=.08){
  if(!sfxOn)return;
  audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=gain;o.connect(g);g.connect(audioCtx.destination);o.start();
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur);
}
function sfx(name){
  if(name==="jump") tone(520,.12,"square",.045);
  if(name==="comic"){tone(740,.08,"triangle",.07);setTimeout(()=>tone(980,.12,"triangle",.06),80)}
  if(name==="cat"){tone(640,.08,"sawtooth",.035);setTimeout(()=>tone(760,.08,"sawtooth",.03),80)}
  if(name==="dog"){tone(180,.12,"square",.06);setTimeout(()=>tone(145,.14,"square",.05),120)}
  if(name==="bird"){tone(1200,.06,"sine",.04);setTimeout(()=>tone(1500,.06,"sine",.035),70)}
  if(name==="hit") tone(90,.22,"square",.08);
  if(name==="trash"){tone(210,.08,"square",.08);setTimeout(()=>tone(95,.28,"sawtooth",.06),80)}
}

function playerImg(state){return `./${currentCharacter}-${state==="jump"?"jump":"run-"+runFrame}.png`}
function setPlayerImage(state){player.style.backgroundImage=`url("${playerImg(state)}")`}
function setCharacter(c){
  if(c==="jaelyn"&&!unlocked.includes("jaelyn")){alert("🔒 Collect 500 coins to unlock Jaelyn!");return}
  currentCharacter=c;localStorage.setItem("comicRunCharacter",c);
  charName.textContent=c==="sloan"?"Sloan":"Jaelyn";setPlayerImage(playerBottom>ground?"jump":"run");
}
function selectJaelyn(){setCharacter("jaelyn")}
function updateUnlock(){
  if(unlocked.includes("jaelyn")){jaelynBtn.textContent="Jaelyn";jaelynBtn.classList.remove("locked")}
  else{jaelynBtn.textContent="🔒 Jaelyn - 500 Coins";jaelynBtn.classList.add("locked")}
}
function updateHud(){scoreEl.textContent=score;coinsEl.textContent=coins;lifeIcons.textContent="♥".repeat(lives)}

function obstaclePool(){
  if(score<100) return ["cat","cone"];
  if(score<300) return ["cat","cone","bird"];
  if(score<500) return ["cat","cone","bird","hydrant"];
  if(score<1000) return ["cat","cone","bird","hydrant","dog"];
  if(score<2000) return ["cat","cone","bird","hydrant","dog"];
  return ["cat","cone","bird","hydrant","dog","trashcan"];
}
function spawnObstacle(){
  const pool=obstaclePool(), type=pool[Math.floor(Math.random()*pool.length)];
  const el=document.createElement("div");el.className=`obstacle ${type}`;el.style.left=game.offsetWidth+"px";game.appendChild(el);
  obstacles.push({el,x:game.offsetWidth,type});
  if(type==="cat")sfx("cat"); if(type==="dog")sfx("dog"); if(type==="bird")sfx("bird");
}
function spawnComic(){
  const el=document.createElement("div");el.className="pickup";el.style.left=game.offsetWidth+"px";game.appendChild(el);
  pickups.push({el,x:game.offsetWidth});
}
function startGame(){
  if(musicOn) music.play().catch(()=>{});
  running=true;score=0;coins=0;lives=2;speed=baseSpeed;velocity=0;playerBottom=ground;
  invincible=false;lastLifeBonus=0;nextComicScore=100;lastSpeedTime=performance.now();spawnTimer=65;
  obstacles.forEach(o=>o.el.remove());pickups.forEach(p=>p.el.remove());obstacles=[];pickups=[];
  player.className="running";setPlayerImage("run");menu.classList.add("hidden");gameOver.classList.add("hidden");
  updateHud();loop();
}
function runAgain(){gameOver.classList.add("hidden");startGame()}
function returnMenu(){gameOver.classList.add("hidden");menu.classList.remove("hidden")}
function jump(){
  if(!running)return;
  if(playerBottom<=ground+1){velocity=jumpPower;player.classList.remove("running");player.classList.add("jump");setPlayerImage("jump");sfx("jump")}
}
function loop(){
  if(!running)return;
  score++; updateHud();

  if(coins>=500&&!unlocked.includes("jaelyn")){
    unlocked.push("jaelyn");localStorage.setItem("comicRunUnlocked",JSON.stringify(unlocked));updateUnlock();alert("🔥 JAELYN UNLOCKED! 🔥");
  }
  if(score>=nextComicScore){spawnComic();nextComicScore+=100}
  const lifeMilestone=Math.floor(score/1000);
  if(lifeMilestone>lastLifeBonus){lastLifeBonus=lifeMilestone;if(lives<2)lives++}
  if(performance.now()-lastSpeedTime>=60000){lastSpeedTime=performance.now();speed*=1.10}

  velocity-=gravity;playerBottom+=velocity;
  if(playerBottom<=ground){
    playerBottom=ground;velocity=0;
    if(player.classList.contains("jump")){player.classList.remove("jump");player.classList.add("running");setPlayerImage("run")}
  }
  player.style.bottom=playerBottom+"px";
  if(playerBottom<=ground+1){runTicker++;if(runTicker>=8){runTicker=0;runFrame=runFrame===1?2:1;setPlayerImage("run")}}

  spawnTimer--;
  if(spawnTimer<=0){spawnObstacle();spawnTimer=Math.max(48,100+Math.random()*78-speed*4)}

  obstacles.forEach(o=>{o.x-=speed;o.el.style.left=o.x+"px"});
  pickups.forEach(p=>{p.x-=speed;p.el.style.left=p.x+"px"});
  obstacles=obstacles.filter(o=>{if(o.x<-150){o.el.remove();return false}return true});
  pickups=pickups.filter(p=>{if(p.x<-120){p.el.remove();return false}return true});

  checkCollisions();checkComics();
  animation=requestAnimationFrame(loop);
}
function shrink(rect,x,y){return{left:rect.left+x,right:rect.right-x,top:rect.top+y,bottom:rect.bottom-y}}
function hit(a,b){return a.left<b.right&&a.right>b.left&&a.top<b.bottom&&a.bottom>b.top}
function checkCollisions(){
  if(invincible)return;
  const p=shrink(player.getBoundingClientRect(),35,18);
  for(const o of obstacles){
    let r=shrink(o.el.getBoundingClientRect(),8,8);
    if(o.type==="bird")r=shrink(o.el.getBoundingClientRect(),12,12);
    if(hit(p,r)){takeHit(o.type);return}
  }
}
function takeHit(type){
  lives--; updateHud();
  if(type==="trashcan")sfx("trash"); else sfx("hit");
  flash.classList.add("hit");game.classList.add("shake");
  setTimeout(()=>{flash.classList.remove("hit");game.classList.remove("shake")},260);
  if(lives<=0){endGame();return}
  invincible=true;player.classList.add("invincible");
  setTimeout(()=>{invincible=false;player.classList.remove("invincible")},1500);
}
function checkComics(){
  const p=shrink(player.getBoundingClientRect(),30,15);
  pickups=pickups.filter(item=>{
    const r=shrink(item.el.getBoundingClientRect(),8,8);
    if(hit(p,r)){coins+=25;score+=25;sfx("comic");pop("+25",item.x);item.el.remove();updateHud();return false}
    return true;
  });
}
function pop(text,x){
  const el=document.createElement("div");el.className="pointsPop";el.textContent=text;el.style.left=x+"px";el.style.bottom="260px";game.appendChild(el);
  setTimeout(()=>el.remove(),850);
}
function endGame(){
  running=false;cancelAnimationFrame(animation);
  finalScore.textContent=score;finalCoins.textContent=coins;gameOver.classList.remove("hidden");
}
function saveScore(){
  const name=document.getElementById("nameInput").value.trim()||"Runner";
  let data=JSON.parse(localStorage.getItem("comicRunBoard")||"[]");
  data.push({name,score});data.sort((a,b)=>b.score-a.score);data=data.slice(0,3);
  localStorage.setItem("comicRunBoard",JSON.stringify(data));updateTicker();returnMenu();
}
function updateTicker(){
  let data=JSON.parse(localStorage.getItem("comicRunBoard")||"[]");
  if(!data.length){tickerText.textContent="TOP RUNNERS: No scores yet — be the first champion!";return}
  tickerText.textContent="TOP RUNNERS: "+data.map((r,i)=>`#${i+1} ${r.name} ${r.score}`).join("   ⚡   ");
}
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();jump()}});
game.addEventListener("click",jump);
game.addEventListener("touchstart",e=>{e.preventDefault();jump()},{passive:false});

updateButtons();updateUnlock();updateTicker();setCharacter(currentCharacter);updateHud();
</script>
</body>
</html>
